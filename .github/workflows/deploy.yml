name: Deploy APK to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Enable legacy peer deps
        run: npm config set legacy-peer-deps true

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # --- DYNAMIC KEY GENERATION & SIGNING ---
      - name: Generate Key and Sign APK
        run: |
          # 1. Generate a temporary keystore file inside the runner
          keytool -genkeypair -v \
            -keystore temp.keystore \
            -alias temp-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass temporarypassword \
            -keypass temporarypassword \
            -dname "CN=ThreadVault, OU=Dev, O=GrepMany, L=Hyderabad, S=TS, C=IN"
          
          # 2. Sign the generated release APK using apksigner (built into Android SDK)
          # The Android SDK is pre-installed on the GitHub ubuntu-latest runner image
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks temp.keystore \
            --ks-pass pass:temporarypassword \
            --key-pass pass:temporarypassword \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release.apk

      # --- PREPARE & DEPLOY ---
      - name: Prepare Pages files
        run: |
          mkdir -p public
          cp android/app/build/outputs/apk/release/app-release-signed.apk public/${REPO_NAME}.apk

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4